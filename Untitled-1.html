<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icon</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@700&family=Russo+One&family=Monoton&display=swap" rel="stylesheet">

<style>
  body {
    background: #000;
    text-align: center;
    padding-top: 100px;
  }

  .name {
    font-size: 70px;
    letter-spacing: 5px;
    display: inline-block;
  }

  span {
    display: inline-block;
    margin: 3px;
  }

 
  .j { font-family: 'Bungee', cursive; color: #22c55e; transform: rotate(-10deg); text-shadow: 2px 2px #000; }
  .o1 { font-family: 'Orbitron', sans-serif; color: #f97316; transform: scale(1.1); text-shadow: 1px 1px #000; }
  .r { font-family: 'Russo One', sans-serif; color: #22c55e; letter-spacing: -2px; text-shadow: 2px 0 #f97316; }
  .o2 { font-family: 'Bungee', cursive; color: #f97316; transform: rotate(8deg); }
  .s1 { font-family: 'Monoton', cursive; color: #22c55e; text-shadow: 1px 2px #f97316; }
  .s2 { font-family: 'Orbitron', sans-serif; color: #f97316; transform: scale(1.05); }

 
  .b { font-family: 'Bungee', cursive; color: #f97316; transform: rotate(-5deg); text-shadow: 2px 2px #000; }
  .a1 { font-family: 'Russo One', sans-serif; color: #22c55e; text-decoration: underline; }
  .n1 { font-family: 'Orbitron', sans-serif; color: #f97316; transform: scale(1.1); }
  .t { font-family: 'Bungee', cursive; color: #22c55e; text-shadow: 1px 1px #f97316; }
  .a2 { font-family: 'Monoton', cursive; color: #f97316; transform: rotate(-8deg); }
  .y { font-family: 'Bungee', cursive; color: #22c55e; transform: skewX(-10deg); }
  .a3 { font-family: 'Russo One', sans-serif; color: #f97316; text-shadow: 1px 1px #000; }
  .n2 { font-family: 'Orbitron', sans-serif; color: #22c55e; transform: scale(1.05); }

</style>
</head>
<body>

<div class="name">
  <span class="j">J</span>
  <span class="o1">O</span>
  <span class="r">R</span>
  <span class="o2">O</span>
  <span class="s1">S</span>
  <span class="s2">S</span>
</div>

<br><br>

<div class="name">
  <span class="b">B</span>
  <span class="a1">A</span>
  <span class="n1">N</span>
  <span class="t">T</span>
  <span class="a2">A</span>
  <span class="y">Y</span>
  <span class="a3">A</span>
  <span class="n2">N</span>
</div>

</body>
</html>
